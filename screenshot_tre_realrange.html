<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body { background: #0d1b2a; margin: 0; padding: 20px; font-family: monospace; color: #74a4be; }
.row { display: flex; gap: 20px; }
.col { flex: 1; }
h3 { font-size: 12px; margin: 0 0 6px; }
.chart-body { height: 300px; position: relative; }
canvas { background: #0d1b2a; }
</style>
</head>
<body>
<script>
const T = 10;
function sl(v) { const a=Math.abs(v); if(a<=T) return v/T; return Math.sign(v)*(Math.log10(a/T)+1); }
function sli(t) { const a=Math.abs(t); if(a<=1) return t*T; return Math.sign(t)*T*Math.pow(10,a-1); }
class SymlogScale extends Chart.LinearScale {
  static id='symlog'; static defaults={};
  buildTicks() {
    const {min,max}=this; const ticks=[];
    if(min<=0&&max>=0) ticks.push({value:0});
    if(min<0) for(let e=0;e<15;e++){const v=-T*Math.pow(10,e); ticks.push({value:v}); if(v<=min)break;}
    if(max>0) for(let e=0;e<15;e++){const v=T*Math.pow(10,e); ticks.push({value:v}); if(v>=max)break;}
    ticks.sort((a,b)=>a.value-b.value);
    if(!ticks.length) return [{value:min},{value:max}];
    this.min=ticks[0].value; this.max=ticks[ticks.length-1].value;
    return ticks;
  }
  getDecimalForValue(v){const a=sl(this.min),b=sl(this.max);return b===a?0:(sl(v)-a)/(b-a);}
  getValueForDecimal(d){if(this._reversePixels)d=1-d;const a=sl(this.min),b=sl(this.max);return sli(a+d*(b-a));}
}
Chart.register(SymlogScale);
</script>

<div class="row">
  <div class="col">
    <h3>Symlog — real range (UP 0..15000, DOWN -14899..241)</h3>
    <div class="chart-body"><canvas id="c1"></canvas></div>
  </div>
  <div class="col">
    <h3>Linear — same range</h3>
    <div class="chart-body"><canvas id="c2"></canvas></div>
  </div>
</div>

<script>
function makePoints(count, min, max) {
  return Array.from({length: count}, (_, i) => ({
    x: i,
    y: min + Math.random() * (max - min)
  }));
}

const upData = makePoints(200, 10, 15000);
const downData = makePoints(200, -14899, 241);

const opts = (type) => ({
  type: 'scatter',
  data: { datasets: [
    { label:'UP', data: upData, backgroundColor:'rgba(0,190,245,0.5)', pointRadius:2 },
    { label:'DOWN', data: downData, backgroundColor:'rgba(254,117,0,0.5)', pointRadius:2 }
  ]},
  options: {
    animation:false, responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false} },
    scales: {
      x:{ticks:{color:'#74a4be'}, grid:{color:'rgba(116,164,190,0.1)'}},
      y:{type, ticks:{color:'#74a4be', callback: v => v + ' €'}, grid:{color:'rgba(116,164,190,0.1)'}}
    }
  }
});

new Chart(document.getElementById('c1'), opts('symlog'));
new Chart(document.getElementById('c2'), opts('linear'));
</script>
</body>
</html>
