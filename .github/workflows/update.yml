name: Daily Market Data Update

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 07:00 CET / 08:00 CEST
  workflow_dispatch:       # allow manual trigger from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit and push data/data.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install keeper-secrets-manager paramiko requests

      - name: Write Keeper config
        run: echo "${{ secrets.KEEPER_CONFIG }}" | base64 -d > keeper_config.json

      - name: Run patch_data.py
        run: python patch_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --staged --quiet || (
            git commit -m "chore: update market data $(date -u +%Y-%m-%d)" &&
            git push
          )
