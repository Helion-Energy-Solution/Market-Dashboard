<!DOCTYPE html>
<html>
<head>
<script>
function onLoad() {
  try {
    const win = document.getElementById('f').contentWindow;
    win.switchMarket('tre');
    setTimeout(() => {
      // Activate log scale
      win.setTreDailyScale && win.setTreDailyScale('log');
      setTimeout(() => {
        const el = win.document.getElementById('cTreDailyPrice');
        if (el) el.scrollIntoView({ behavior: 'instant' });
      }, 500);
    }, 1000);
  } catch(e) { console.error(e); }
}
</script>
</head>
<body style="margin:0;padding:0;">
<iframe id="f" src="http://localhost:3000/" style="width:1440px;height:2000px;border:none;" onload="onLoad()"></iframe>
</body>
</html>
